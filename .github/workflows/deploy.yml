name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Google API key from secret
        env:
          ROADBITE_KEY: ${{ secrets.ROADBITE_KEY }}
        run: |
          if [ -z "$ROADBITE_KEY" ]; then
            echo "::error::ROADBITE_KEY secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          sed -i "s|__ROADBITE_KEY__|${ROADBITE_KEY}|g" config.js
          echo "Injected key into config.js"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
